<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" id="dynamic-favicon" />
    <link rel="apple-touch-icon" href="/erp-icon.png" id="dynamic-apple-icon" />
    <meta name="apple-mobile-web-app-title" content="Transport ERP" id="dynamic-app-title" />
    
    <!-- PWA Optimization Tags to prevent white flashes -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1c1917" /> <!-- Matches stone-900 -->
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Transport ERP</title>
    <style>
      /* Inline CSS for the exact moment before React loads */
      body {
        margin: 0;
        background-color: #1c1917; /* stone-900 */
      }
      #splash-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #1c1917;
        z-index: 9999;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-top-color: #6366f1; /* indigo-500 */
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- This HTML is instantly replaced by React once it loads, but hides the empty white screen -->
      <div id="splash-screen">
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
